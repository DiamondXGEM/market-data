name: Update Market

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install requests

      - name: Update Market
        run: |
          python << EOF
          import json
          import requests
          from datetime import datetime

          headers={
              "User-Agent":"Mozilla/5.0"
          }

          url="https://brsapi.ir/Api/Market/Gold_Currency.php"

          r=requests.get(url,headers=headers,timeout=20)
          data=r.json()

          usd=0
          gold18=0

          for item in data:
              name=str(item.get("name",""))

              if "دلار" in name and usd==0:
                  usd=item["price"]

              if "طلای 18" in name or "طلای ۱۸" in name:
                  gold18=item["price"]

          out={
              "usd":usd,
              "gold18":gold18,
              "updated":datetime.now().strftime("%Y-%m-%d %H:%M:%S")
          }

          with open("market.json","w",encoding="utf8") as f:
              json.dump(out,f,ensure_ascii=False,indent=2)
          EOF

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add market.json

          git diff --cached --quiet || git commit -m "Update market"

          git push
